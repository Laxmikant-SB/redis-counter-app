name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python test_app.py

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only push on actual commits to main, not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and tag image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:latest \
                     ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:${{ github.sha }}

      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:${{ github.sha }}

      - name: Confirm push
        run: |
          echo "✅ Image pushed successfully!"
          echo "Pull it with: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:latest"

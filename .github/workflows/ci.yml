name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python test_app.py

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.set-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:latest \
                     ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:${{ github.sha }}
          echo "✅ Image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/redis-counter-app:${{ github.sha }}"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Simulate deployment
        run: |
          echo "======================================"
          echo "DEPLOYMENT STARTED"
          echo "======================================"
          echo "Image: laxmikant07/redis-counter-app:${{ github.sha }}"
          echo "Time:  $(date)"
          echo "Deployer: ${{ github.actor }}"
          echo ""
          echo "Steps that would run on real server:"
          echo "  1. SSH into server"
          echo "  2. docker pull laxmikant07/redis-counter-app:${{ github.sha }}"
          echo "  3. docker stop redis-counter-app"
          echo "  4. docker rm redis-counter-app"
          echo "  5. docker run -d laxmikant07/redis-counter-app:${{ github.sha }}"
          echo ""
          echo "✅ Deployment complete!"
          echo "======================================"

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | laxmikant07/redis-counter-app:${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
